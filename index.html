<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="MiInfo – Fideliza clientes con juegos interactivos en WhatsApp.">
<title>MiInfo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --green:#25D366;--green-dark:#128C7E;
  --black:#0d0d0d;--white:#ffffff;
  --gray:#f7f7f5;--gray2:#e8e8e4;--gray-text:#6b6b6b;
}

body{
  font-family:system-ui,-apple-system,sans-serif;
  color:var(--black);
  background:var(--white);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  z-index:100;
  background:rgba(255,255,255,0.9);
  padding:1rem;
  display:flex;
  justify-content:space-between;
}

/* HERO */
#hero{
  position:relative;
  width:100%;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  padding-top:60px;
}

/* 🔥 CANVAS CORREGIDO */
#net{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  display:block;
  opacity:.6;
}

/* CONTENIDO */
.hero-inner{
  position:relative;
  z-index:2;
  text-align:center;
  max-width:700px;
}

h1{
  font-size:clamp(2rem,5vw,3rem);
  font-weight:800;
  margin-bottom:1rem;
}

.hero-sub{
  color:var(--gray-text);
  margin-bottom:2rem;
}

.btn{
  background:var(--green);
  color:#fff;
  padding:.9rem 2rem;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
}
</style>
</head>

<body>

<nav>
  <div>MiInfo</div>
  <a href="#">WhatsApp</a>
</nav>

<section id="hero">
  <canvas id="net"></canvas>

  <div class="hero-inner">
    <h1>Usuarios jugando, aprendiendo y ganando</h1>
    <p class="hero-sub">
      Juega y aprende: la nueva forma de fidelizar clientes por WhatsApp.
    </p>
    <a class="btn" href="#">Solicitar demo</a>
  </div>
</section>

<script>
// 🔥 ANIMACIÓN CORREGIDA TOTAL
const canvas = document.getElementById('net');
const ctx = canvas.getContext('2d');

let W,H,points=[];

function resizeCanvas(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = document.getElementById('hero').offsetHeight;

  points = [];

  for(let i=0;i<90;i++){
    points.push({
      x:Math.random()*W,
      y:Math.random()*H,
      vx:(Math.random()-0.5)*0.4,
      vy:(Math.random()-0.5)*0.4,
      r:Math.random()*2+1.5
    });
  }
}

window.addEventListener('load', resizeCanvas);
window.addEventListener('resize', resizeCanvas);

function draw(){
  ctx.clearRect(0,0,W,H);

  for(let i=0;i<points.length;i++){
    let p=points[i];

    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>W) p.vx*=-1;
    if(p.y<0||p.y>H) p.vy*=-1;

    for(let j=i+1;j<points.length;j++){
      let q=points[j];
      let dx=p.x-q.x;
      let dy=p.y-q.y;
      let d=Math.sqrt(dx*dx+dy*dy);

      if(d<170){
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(q.x,q.y);
        ctx.strokeStyle=`rgba(37,211,102,${0.4*(1-d/170)})`;
        ctx.lineWidth=0.6;
        ctx.stroke();
      }
    }

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='rgba(37,211,102,0.7)';
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
