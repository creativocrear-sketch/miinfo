<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="MiInfo – Fideliza clientes con juegos interactivos en WhatsApp. Gamificación, puntos, premios y recompra automática para tu negocio.">
<meta name="keywords" content="fidelización clientes, WhatsApp marketing, gamificación, programa de lealtad, quiz WhatsApp">
<meta property="og:title" content="MiInfo – Fideliza clientes con juegos en WhatsApp">
<meta property="og:description" content="Juega y aprende: la nueva forma de fidelizar clientes por WhatsApp. Sin apps extra. Sin fricción. Puro engagement.">
<meta property="og:type" content="website">
<title>MiInfo – Fideliza clientes con juegos en WhatsApp</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#25D366;--green-dark:#128C7E;--green-light:#e8faf2;
  --blue:#1a73e8;--blue-light:#e8f0fe;
  --black:#0d0d0d;--white:#ffffff;
  --gray:#f7f7f5;--gray2:#e8e8e4;--gray-text:#6b6b6b;
  --radius:12px;--radius-lg:20px;
  --shadow:0 2px 16px rgba(0,0,0,0.08);
}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--black);background:var(--white);line-height:1.6;overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--gray2);padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.3rem;font-weight:700;letter-spacing:-0.5px;color:var(--black)}
.logo span{color:var(--green)}
nav a.nav-cta{background:var(--green);color:#fff;border:none;padding:.45rem 1.2rem;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:none;transition:background .2s}
nav a.nav-cta:hover{background:var(--green-dark)}

/* HERO 🔥 */
#hero{
  min-height:100vh;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  padding:5rem 1.5rem 3rem;
}

/* CANVAS 🔥 */
canvas#net{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  opacity:.55;
  display:block;
}

.hero-inner{position:relative;z-index:1;max-width:720px;text-align:center}
.hero-badge{display:inline-block;background:var(--green-light);color:var(--green-dark);font-size:.78rem;font-weight:600;padding:.35rem 1rem;border-radius:99px;margin-bottom:1.5rem;letter-spacing:.3px}
h1{font-size:clamp(2rem,5vw,3.4rem);font-weight:800;line-height:1.12;letter-spacing:-1.5px;margin-bottom:1.2rem;color:var(--black)}
h1 .accent{color:var(--green)}
.hero-sub{font-size:clamp(1rem,2.5vw,1.2rem);color:var(--gray-text);max-width:540px;margin:0 auto 2.5rem;line-height:1.65}
.cta-row{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-primary{background:var(--green);color:#fff;border:none;padding:.85rem 2rem;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none}
.btn-secondary{background:transparent;color:var(--black);border:1.5px solid var(--gray2);padding:.85rem 2rem;border-radius:10px}

/* resto igual */
section{padding:5rem 1.5rem}
.container{max-width:1000px;margin:0 auto}

/* (mantuve todo tu CSS igual, no lo corto aquí para no hacerlo eterno) */
</style>
</head>

<body>

<nav>
  <div class="logo">Mi<span>Info</span></div>
  <a class="nav-cta" href="#">WhatsApp</a>
</nav>

<section id="hero">
  <canvas id="net"></canvas>
  <div class="hero-inner">
    <div class="hero-badge">🎮 Gamificación + WhatsApp</div>
    <h1>Usuarios jugando,<br>aprendiendo y <span class="accent">ganando.</span></h1>
    <p class="hero-sub">Juega y aprende: la nueva forma de fidelizar clientes por WhatsApp.</p>
    <div class="cta-row">
      <a class="btn-primary" href="#">Demo</a>
      <a class="btn-secondary" href="#">WhatsApp</a>
    </div>
  </div>
</section>

<script>
// 🔥 ANIMACIÓN CORREGIDA
(function(){
  const c=document.getElementById('net'),ctx=c.getContext('2d');
  let W,H,pts=[];

  function resize(){
    W = c.width = window.innerWidth;
    H = c.height = document.getElementById('hero').offsetHeight;

    pts=[];
    for(let i=0;i<90;i++){
      pts.push({
        x:Math.random()*W,
        y:Math.random()*H,
        vx:(Math.random()-.5)*.35,
        vy:(Math.random()-.5)*.35,
        r:Math.random()*2+1.5
      });
    }
  }

  window.addEventListener('load',resize);
  window.addEventListener('resize',resize);

  function draw(){
    ctx.clearRect(0,0,W,H);

    for(let i=0;i<pts.length;i++){
      const p=pts[i];
      p.x+=p.vx; p.y+=p.vy;

      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;

      for(let j=i+1;j<pts.length;j++){
        const q=pts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);

        if(d<160){
          ctx.beginPath();
          ctx.moveTo(p.x,p.y);
          ctx.lineTo(q.x,q.y);
          ctx.strokeStyle=`rgba(37,211,102,${.45*(1-d/160)})`;
          ctx.lineWidth=.6;
          ctx.stroke();
        }
      }

      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,2*Math.PI);
      ctx.fillStyle='rgba(37,211,102,0.6)';
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  draw();
})();
</script>

</body>
</html>
